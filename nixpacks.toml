[phases.setup]
nixPkgs = ["nodejs_20", "chromium", "glib", "nss", "nspr", "dbus", "atk", "cups", "libdrm", "xorg.libX11", "xorg.libXcomposite", "xorg.libXdamage", "xorg.libXext", "xorg.libXfixes", "xorg.libXrandr", "libxkbcommon", "pango", "cairo", "alsa-lib"]

[phases.build]
cmds = ["npm install"]

[start]
cmd = "PLAYWRIGHT_BROWSERS_PATH=/usr/bin npx playwright install chromium && node render-server.js"
